<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearcountry Trails of Franklin, NC</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2E7D32">
    <link rel="apple-touch-icon" href="background.jpg">

    <!-- Preconnect to Google Fonts to reduce latency on first visit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Material Symbols loaded non-blocking via display=swap -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&display=swap" />

    <style>
        /* Liquid Glass / Glassmorphism Design */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            text-align: center;
            padding: 20px 10px;
            margin: 0;
            min-height: 100vh;
        }
        /* Dark overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(38, 38, 38, 0.4); 
            z-index: -1;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Glass Header */
        .header {
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(15px);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(38, 38, 38, 0.3);
        }
        h1 {
            font-size: 26px;
            margin: 0 0 5px 0;
            text-shadow: 1px 1px 4px rgba(38, 38, 38, 0.5);
        }
        p {
            font-size: 15px;
            margin-top: 0;
            opacity: 0.9;
        }

        /* Controls */
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-glass {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(38, 38, 38, 0.2);
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        .btn-glass:hover, .btn-glass:active {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
        }
        @media (min-width: 600px) {
            .controls {
                gap: 10px;
            }
            .btn-glass {
                padding: 8px 16px;
            }
        }
        #status-msg {
            font-size: 14px;
            margin-top: 10px;
            color: #a8e6cf;
            height: 20px;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(38, 38, 38, 0.8);
        }

        /* Grid & Glass Cards */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media(min-width: 600px) {
            .grid { grid-template-columns: 1fr 1fr; }
        }
        @media(min-width: 960px) {
            .grid { grid-template-columns: 1fr 1fr 1fr; }
        }
        @media(min-width: 1280px) {
            .grid { grid-template-columns: 1fr 1fr 1fr 1fr; }
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(15px);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(38, 38, 38, 0.3);
            overflow: hidden;
            text-align: left;
            transition: transform 0.3s ease;
        }
        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .card-content {
            padding: 16px;
        }
        .category-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #fff;
            margin-bottom: 8px;
            box-shadow: 0 2px 4px rgba(38, 38, 38, 0.3);
        }
        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 8px 0;
            text-shadow: 1px 1px 3px rgba(38, 38, 38, 0.6);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        /* Trail Stats (Icons & Info) */
        .trail-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .stat-badge {
            background: rgba(38, 38, 38, 0.3);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #e0f2f1;
        }
        .stat-badge .material-symbols-outlined {
            font-size: 16px;
            color: #a8e6cf;
        }

        .card-dist {
            font-size: 13px;
            color: #a8e6cf;
            font-weight: 600;
            text-align: right;
            white-space: nowrap;
        }
        .trail-desc {
            font-size: 14px;
            color: #e0e0e0;
            line-height: 1.4;
            margin-bottom: 15px;
            margin-top: 0;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .map-btn {
            background-color: rgba(46, 125, 50, 0.8);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 12px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
        }
        .map-btn:active {
            background-color: rgba(27, 94, 32, 0.9);
            transform: scale(0.98);
        }

        /* PWA Install Info Panel */
        #pwa-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(0, 0, 0, 0.35);
        }
        #pwa-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            background: rgba(15, 35, 15, 0.93);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 16px;
            padding: 22px 22px 18px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.55);
            max-width: 320px;
            width: calc(100vw - 40px);
            color: #fff;
            text-align: left;
        }
        #pwa-panel h3 {
            margin: 0 0 12px 0;
            font-size: 16px;
            padding-right: 24px;
        }
        #pwa-panel ol {
            margin: 0;
            padding-left: 18px;
            font-size: 14px;
            line-height: 1.7;
            color: #e0f2f1;
        }
        #pwa-panel .pwa-note {
            font-size: 12px;
            color: #a8e6cf;
            margin-top: 10px;
            line-height: 1.4;
        }
        #pwa-install-now {
            display: none;
            margin-top: 14px;
            width: 100%;
            background: rgba(46, 125, 50, 0.85);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        #pwa-install-now:active { background: rgba(27, 94, 32, 0.95); }
        #pwa-close-btn {
            position: absolute;
            top: 10px;
            right: 13px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.65);
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            padding: 0;
        }
        #pwa-close-btn:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Nearcountry Trails</h1>
            <p>Franklin, NC • Select a trail to navigate</p>
            <div class="controls">
                <button class="btn-glass" onclick="sortByDistance()" title="Sort by Length">
                    <span class="material-symbols-outlined" style="font-size:18px;">straighten</span> Length
                </button>
                <button class="btn-glass" onclick="sortByElevation()" title="Sort by Elevation Gain">
                    <span class="material-symbols-outlined" style="font-size:18px;">terrain</span> Elevation
                </button>
                <button class="btn-glass" onclick="sortByType()" title="Group by Trail Type">
                    <span class="material-symbols-outlined" style="font-size:18px;">category</span> Type
                </button>
                <button class="btn-glass" onclick="sortByDrivingTime()" id="sort-btn">
                    <span class="material-symbols-outlined" style="font-size:18px;">directions_car</span> Nearest Drive
                </button>
                <button class="btn-glass" onclick="resetSort()" title="Clear Filters/Sort">
                    <span class="material-symbols-outlined" style="font-size:18px;">refresh</span> Reset
                </button>
                <button class="btn-glass" id="pwa-btn" onclick="showPwaInfo()" title="Add to Home Screen">
                    <span class="material-symbols-outlined" style="font-size:18px;">download_for_offline</span> Install
                </button>
            </div>
            <div id="status-msg"></div>
        </div>

        <div class="grid" id="trail-grid">
            <!-- Cards dynamically injected here -->
        </div>
    </div>

    <!-- PWA Install Info Panel (not a browser popup) -->
    <div id="pwa-overlay" onclick="closePwaInfo()"></div>
    <div id="pwa-panel" role="dialog" aria-modal="true" aria-labelledby="pwa-panel-title">
        <button id="pwa-close-btn" onclick="closePwaInfo()" aria-label="Close">&#x2715;</button>
        <h3 id="pwa-panel-title">📲 Add to Home Screen</h3>
        <ol id="pwa-steps"></ol>
        <p class="pwa-note" id="pwa-note"></p>
        <button id="pwa-install-now" onclick="triggerInstall()">Install Now</button>
    </div>

    <script>

        let trails = [

            { id: 10, name: "10. Winding Stair Gap to Siler Bald", category: "Appalachian Trail", catColor: "#2b6e8c", lat: 35.12067, lng: -83.54708, length: "9 mi", elevation: "1,450 ft", typeText: "Out & Back", typeIcon: "timeline", desc: "Beautiful balds." },

            { id: 12, name: "12. Parker Meadows", category: "Park", catColor: "#914b96", lat: 35.15472, lng: -83.45669, length: "1.1 mi", elevation: "250 ft", typeText: "Loop", typeIcon: "loop", desc: "Great family walking loop." },
            
            // Greenways using generic pamphlet stats
            { id: 13, name: "13. Suli Marsh", category: "Greenway", catColor: "#24a688", lat: 35.19675, lng: -83.38714, length: "1-5 mi", elevation: "190 ft", typeText: "Out & Back", typeIcon: "timeline", desc: "Paved greenway along river." },
            { id: 14, name: "14. Big Bear Park", category: "Greenway", catColor: "#24a688", lat: 35.18686, lng: -83.37392, length: "1-5 mi", elevation: "190 ft", typeText: "Out & Back", typeIcon: "timeline", desc: "Paved greenway along river." },
            { id: 15, name: "15. Riverwalk", category: "Greenway", catColor: "#24a688", lat: 35.18533, lng: -83.37094, length: "1-5 mi", elevation: "190 ft", typeText: "Out & Back", typeIcon: "timeline", desc: "Paved greenway along river." },
            { id: 16, name: "16. Salali Ln", category: "Greenway", catColor: "#24a688", lat: 35.17558, lng: -83.36992, length: "1-5 mi", elevation: "190 ft", typeText: "Out & Back", typeIcon: "timeline", desc: "Paved greenway along river." },
            { id: 17, name: "17. Tassee Park", category: "Greenway", catColor: "#24a688", lat: 35.17356, lng: -83.37217, length: "1-5 mi", elevation: "190 ft", typeText: "Out & Back", typeIcon: "timeline", desc: "Paved greenway along river." },
            { id: 18, name: "18. Southwestern CC", category: "Greenway", catColor: "#24a688", lat: 35.15967, lng: -83.37922, length: "1-5 mi", elevation: "190 ft", typeText: "Out & Back", typeIcon: "timeline", desc: "Paved greenway along river." },
            { id: 19, name: "19. Library", category: "Greenway", catColor: "#24a688", lat: 35.15856, lng: -83.38178, length: "1-5 mi", elevation: "190 ft", typeText: "Out & Back", typeIcon: "timeline", desc: "Paved greenway along river." },
            
            // Schools
            { id: 20, name: "20. Cartoogechaye Loop", category: "Schools", catColor: "#2729ab", lat: 35.16733, lng: -83.43583, length: "0.25 mi", elevation: "0 ft", typeText: "Loop", typeIcon: "loop", desc: "Track at local school." },
            { id: 21, name: "21. Cove Branch (MVI)", category: "Schools", catColor: "#2729ab", lat: 35.16383, lng: -83.36111, length: "0.3 mi", elevation: "0 ft", typeText: "Out & Back", typeIcon: "timeline", desc: "School walking path." },
            { id: 22, name: "22. Macon Middle Loop", category: "Schools", catColor: "#2729ab", lat: 35.16136, lng: -83.35739, length: "0.5 mi", elevation: "20 ft", typeText: "Loop", typeIcon: "loop", desc: "School walking path." },
            { id: 23, name: "23. South Macon Loop", category: "Schools", catColor: "#2729ab", lat: 35.11281, lng: -83.40003, length: "0.5 mi", elevation: "20 ft", typeText: "Loop", typeIcon: "loop", desc: "School walking path." },
        ];

        // Device routing logic
        function openMap(lat, lng) {
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            if (isIOS) {
                window.location.href = "https://maps.apple.com/?q=" + lat + "," + lng;
            } else {
                window.location.href = "https://www.google.com/maps/search/?api=1&query=" + lat + "," + lng;
            }
        }

        // Render the trail cards to the DOM
        const VALID_MATERIAL_ICONS = ['hiking', 'landscape', 'timeline', 'map', 'directions_car', 'near_me', 'straighten', 'terrain', 'category', 'refresh', 'sync_alt', 'route'];

        function getTypeIconHtml(typeIcon) {
            if (typeIcon === 'loop') {
                return `<svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor"><path d="m360-120-57-56 64-64h-7q-117 0-198.5-81.5T80-520q0-117 81.5-198.5T360-800h240q117 0 198.5 81.5T880-520q0 117-81.5 198.5T600-240v-80q83 0 141.5-58.5T800-520q0-83-58.5-141.5T600-720H360q-83 0-141.5 58.5T160-520q0 83 58.5 142.5T360-312h16l-72-72 56-56 160 160-160 160Z"/></svg>`;
            } else if (typeIcon === 'hub') {
                return `<svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor"><path d="M160-440v-80h304l200-200H560v-80h240v240h-80v-104L496-440H160Zm400 280v-80h104L536-366l58-58 126 128v-104h80v240H560Z"/></svg>`;
            } else if (VALID_MATERIAL_ICONS.includes(typeIcon)) {
                return `<span class="material-symbols-outlined" style="font-size:16px;">${typeIcon}</span>`;
            }
            return '';
        }

        function renderTrails() {
            const grid = document.getElementById('trail-grid');
            let html = '';

            trails.forEach(trail => {
                let distHtml = trail.driveTimeText 
                    ? `<span class="card-dist" title="Drive time from you"><span class="material-symbols-outlined" style="font-size:14px; vertical-align:middle;">directions_car</span> ${trail.driveTimeText}</span>`
                    : ``;
                
                let imgHtml = trail.img ? `<img src="${trail.img}" alt="Trail Photo" loading="lazy">` : ``;

                html += `
                    <div class="card">
                        ${imgHtml}
                        <div class="card-content">
                            <div class="category-badge" style="background-color: ${trail.catColor}">${trail.category}</div>
                            <h2 class="card-title">
                                <span>${trail.name}</span>
                                ${distHtml}
                            </h2>
                            
                            <div class="trail-stats">
                                <div class="stat-badge" title="Hike Length">
                                    <span class="material-symbols-outlined">hiking</span> ${trail.length}
                                </div>
                                <div class="stat-badge" title="Elevation Change">
                                    <span class="material-symbols-outlined">landscape</span> ${trail.elevation}
                                </div>
                                <div class="stat-badge" title="Trail Type">
                                    ${getTypeIconHtml(trail.typeIcon)} ${trail.typeText}
                                </div>
                            </div>
                            
                            <p class="trail-desc">${trail.desc}</p>

                            <button class="map-btn" onclick="openMap(${trail.lat}, ${trail.lng})">
                                <span class="material-symbols-outlined">map</span> Navigate
                            </button>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // Helper to format seconds into readable drive time
        function formatDuration(sec) {
            let mins = Math.round(sec / 60);
            if (mins < 60) return mins + " min";
            let hrs = Math.floor(mins / 60);
            let m = mins % 60;
            return hrs + " hr " + m + " min";
        }

        // Sorting Utility Functions
        function parseLength(str) {
            if(str.toLowerCase().includes("varies")) return 999;
            let match = str.match(/([\d\.]+)/);
            return match ? parseFloat(match[1]) : 0;
        }

        function parseElevation(str) {
            if(str.toLowerCase().includes("varies")) return 99999;
            let cleanStr = str.replace(/,/g, '');
            let match = cleanStr.match(/([\d\.]+)(k)?/i);
            if(match) {
                let num = parseFloat(match[1]);
                if(match[2]) num *= 1000;
                return num;
            }
            return 0;
        }

        function sortByDistance() {
            trails.sort((a, b) => parseLength(a.length) - parseLength(b.length));
            renderTrails();
            document.getElementById('status-msg').textContent = "Sorted by Length (Shortest to Longest)";
        }

        function sortByElevation() {
            trails.sort((a, b) => parseElevation(a.elevation) - parseElevation(b.elevation));
            renderTrails();
            document.getElementById('status-msg').textContent = "Sorted by Elevation Gain (Lowest to Highest)";
        }

        function sortByType() {
            trails.sort((a, b) => a.typeText.localeCompare(b.typeText));
            renderTrails();
            document.getElementById('status-msg').textContent = "Grouped by Trail Type";
        }

        function resetSort() {
            trails.sort((a, b) => a.id - b.id);
            renderTrails();
            document.getElementById('status-msg').textContent = "Original Order Restored";
        }

        // Haversine fallback if routing API fails
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 3958.8; 
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }
        function deg2rad(deg) { return deg * (Math.PI/180); }

        async function sortByDrivingTime() {
            const statusMsg = document.getElementById('status-msg');
            const btn = document.getElementById('sort-btn');
            
            if (!navigator.geolocation) {
                statusMsg.textContent = "Geolocation is not supported by your browser.";
                return;
            }

            statusMsg.textContent = "Locating you... (Please allow access)";
            btn.disabled = true;
            btn.style.opacity = '0.5';
            
            navigator.geolocation.getCurrentPosition(
                async function(position) {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;
                    
                    statusMsg.textContent = "Calculating drive times...";

                    // Build coordinate string for OSRM public API (format: lng,lat;lng,lat...)
                    // Index 0 is the user. Index 1+ are the trails.
                    let coordsString = `${userLng},${userLat}`;
                    trails.forEach(t => {
                        coordsString += `;${t.lng},${t.lat}`;
                    });

                    try {
                        // Use Open Source Routing Machine (OSRM) to calculate drive time matrix
                        let response = await fetch(`https://router.project-osrm.org/table/v1/driving/${coordsString}?sources=0`);
                        let data = await response.json();

                        if(data.code === 'Ok') {
                            let durations = data.durations[0]; // Array of drive times in seconds
                            trails.forEach((trail, i) => {
                                trail.durationSec = durations[i + 1]; // Offset by 1 because 0 is the user
                                trail.driveTimeText = formatDuration(trail.durationSec);
                            });
                        } else {
                            throw new Error("Routing failed");
                        }
                    } catch(e) {
                        // Fallback: If API fails, estimate driving time based on straight-line distance (avg 40mph mountain roads)
                        trails.forEach(trail => {
                            let distMiles = calculateDistance(userLat, userLng, trail.lat, trail.lng);
                            trail.durationSec = (distMiles / 40) * 3600; 
                            trail.driveTimeText = formatDuration(trail.durationSec) + " (est)";
                        });
                    }

                    // Sort array by shortest drive time
                    trails.sort((a, b) => a.durationSec - b.durationSec);

                    renderTrails();
                    statusMsg.textContent = "Sorted by shortest drive!";
                    btn.disabled = false;
                    btn.style.opacity = '1';
                },
                function(error) {
                    statusMsg.textContent = "Unable to get your location. Please check permissions.";
                    btn.disabled = false;
                    btn.style.opacity = '1';
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        // Load admin-saved trail data from localStorage if available
        (function() {
            try {
                const saved = localStorage.getItem('trailsData');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length) {
                        trails = parsed;
                    }
                }
            } catch(e) { console.warn('Could not load saved trail data:', e); }
        })();

        window.onload = renderTrails;

        // ── PWA Install Logic ──────────────────────────────────────────────
        let _deferredInstallPrompt = null;

        // Capture the browser's native install prompt (Chrome / Android / Edge)
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            _deferredInstallPrompt = e;
        });

        function showPwaInfo() {
            // If already running as a standalone PWA, nothing to install
            if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) {
                alert('This app is already installed on your device!');
                return;
            }

            const ua = navigator.userAgent;
            const isIOS = /iPad|iPhone|iPod/.test(ua) ||
                          (/Macintosh/i.test(ua) && navigator.maxTouchPoints > 1);
            const isAndroid = /Android/.test(ua);
            const isSafari = /Safari/.test(ua) && !/Chrome/.test(ua);
            const isChrome = /Chrome/.test(ua) && !/Edg/.test(ua);
            const isEdge   = /Edg/.test(ua);
            const isFirefox = /Firefox/.test(ua);

            const stepsEl = document.getElementById('pwa-steps');
            const noteEl  = document.getElementById('pwa-note');
            const installBtn = document.getElementById('pwa-install-now');
            const titleEl = document.getElementById('pwa-panel-title');

            installBtn.style.display = 'none';

            if (isIOS && isSafari) {
                titleEl.textContent = '📱 Install on iPhone / iPad';
                stepsEl.innerHTML = `
                    <li>Tap the <strong>Share</strong> button&nbsp;(&#x2b06;&#xfe0f; the box with an arrow) at the bottom of Safari.</li>
                    <li>Scroll down and tap <strong>"Add to Home Screen"</strong>.</li>
                    <li>Tap <strong>"Add"</strong> in the top-right corner.</li>`;
                noteEl.textContent = '';
            } else if (isIOS && !isSafari) {
                titleEl.textContent = '📱 Install on iPhone / iPad';
                stepsEl.innerHTML = '';
                noteEl.innerHTML = '⚠️ PWA installation requires <strong>Safari</strong> on iOS. Open this page in Safari, then use Share → Add to Home Screen.';
            } else if (isAndroid && _deferredInstallPrompt) {
                titleEl.textContent = '📱 Install on Android';
                stepsEl.innerHTML = `<li>Tap <strong>"Install Now"</strong> below to add the app to your home screen.</li>`;
                noteEl.textContent = '';
                installBtn.style.display = 'block';
            } else if (isAndroid && isChrome) {
                titleEl.textContent = '📱 Install on Android';
                stepsEl.innerHTML = `
                    <li>Tap the <strong>menu</strong> button (⋮) in Chrome.</li>
                    <li>Tap <strong>"Add to Home Screen"</strong> or <strong>"Install app"</strong>.</li>
                    <li>Tap <strong>"Install"</strong> to confirm.</li>`;
                noteEl.textContent = '';
            } else if (isAndroid && isFirefox) {
                titleEl.textContent = '📱 Install on Android (Firefox)';
                stepsEl.innerHTML = `
                    <li>Tap the <strong>menu</strong> button (⋮) in Firefox.</li>
                    <li>Tap <strong>"Install"</strong>.</li>`;
                noteEl.textContent = '';
            } else if (_deferredInstallPrompt) {
                // Desktop Chrome / Edge with install prompt available
                titleEl.textContent = '🖥️ Install on Desktop';
                stepsEl.innerHTML = `<li>Tap <strong>"Install Now"</strong> below to install the app.</li>`;
                noteEl.textContent = '';
                installBtn.style.display = 'block';
            } else if (isChrome || isEdge) {
                titleEl.textContent = '🖥️ Install on Desktop';
                stepsEl.innerHTML = `
                    <li>Look for the <strong>install icon</strong> (⊕) in your browser's address bar.</li>
                    <li>Click it, then click <strong>"Install"</strong>.</li>`;
                noteEl.textContent = 'Tip: If you don\'t see the icon, try reloading the page.';
            } else {
                titleEl.textContent = '📲 Add to Home Screen';
                stepsEl.innerHTML = `<li>Open your browser's <strong>menu</strong> and look for <strong>"Install"</strong> or <strong>"Add to Home Screen"</strong>.</li>`;
                noteEl.textContent = 'For the best experience, use Chrome (Android / Desktop) or Safari (iPhone / iPad).';
            }

            document.getElementById('pwa-overlay').style.display = 'block';
            document.getElementById('pwa-panel').style.display = 'block';
        }

        function closePwaInfo() {
            document.getElementById('pwa-overlay').style.display = 'none';
            document.getElementById('pwa-panel').style.display = 'none';
        }

        async function triggerInstall() {
            if (!_deferredInstallPrompt) return;
            _deferredInstallPrompt.prompt();
            const choice = await _deferredInstallPrompt.userChoice;
            _deferredInstallPrompt = null;
            if (choice.outcome === 'accepted') {
                closePwaInfo();
                document.getElementById('pwa-btn').style.display = 'none';
            }
        }

        // Hide install button if already running as standalone PWA
        // (Script is inline at end of body so DOM is already available here)
        if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) {
            const btn = document.getElementById('pwa-btn');
            if (btn) btn.style.display = 'none';
        }
        // ── End PWA Install Logic ──────────────────────────────────────────

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
